name: Test & Coverage

on:
  push:
    branches: [main, develop, participant3-verification]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  test:
    name: Forge Test Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Run Forge tests with Docker
        run: docker run --rm -v "$PWD":/work -w /work/contracts ghcr.io/foundry-rs/foundry:latest forge test -vvv

      - name: Run Forge coverage with Docker
        run: docker run --rm -v "$PWD":/work -w /work/contracts ghcr.io/foundry-rs/foundry:latest forge coverage --report lcov --ir-minimum

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        continue-on-error: true
        with:
          files: ./contracts/lcov.info
          flags: unittests
          name: codecov-umbrella

  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Run forge fmt check with Docker
        run: docker run --rm -v "$PWD":/work -w /work/contracts ghcr.io/foundry-rs/foundry:latest forge fmt --check src test script

  slither:
    name: Slither Security Analysis
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Run Slither
        uses: crytic/slither-action@v0.2.0
        with:
          node-version: 18
          target: contracts/

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        working-directory: ./frontend
        run: npm install

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

      - name: Check build output
        working-directory: ./frontend
        run: test -d dist && echo "Build successful" || exit 1
