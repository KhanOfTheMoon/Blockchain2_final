type Proposal @entity(immutable: false) {
  id: ID!
  proposalId: BigInt!
  proposer: Bytes!
  description: String!
  voteStart: BigInt!
  voteEnd: BigInt!
  state: String!
  createdAt: BigInt!
  blockNumber: BigInt!
  transactionHash: Bytes!
}

type Vote @entity(immutable: true) {
  id: ID!
  proposal: Proposal!
  proposalId: BigInt!
  voter: Bytes!
  support: Int!
  weight: BigInt!
  reason: String!
  timestamp: BigInt!
  blockNumber: BigInt!
  transactionHash: Bytes!
}

type Swap @entity(immutable: true) {
  id: ID!
  trader: Bytes!
  tokenIn: Bytes!
  tokenOut: Bytes!
  amountIn: BigInt!
  amountOut: BigInt!
  timestamp: BigInt!
  blockNumber: BigInt!
  transactionHash: Bytes!
}
