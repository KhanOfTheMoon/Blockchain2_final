specVersion: 0.0.6
description: Blockchain2 Final Project Subgraph for Governor and AMM on Arbitrum Sepolia
repository: https://github.com/blockchain2-final/project
schema:
  file: ./schema.graphql

dataSources:
  - kind: ethereum/contract
    name: MyGovernor
    network: arbitrum-sepolia
    source:
      address: "0x7Fa555f86ff582fa024A0cAD24f70daE06d4a086"
      abi: MyGovernor
      startBlock: 269162074
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Proposal
        - Vote
      abis:
        - name: MyGovernor
          file: ./abis/MyGovernor.json
      eventHandlers:
        - event: ProposalCreated(uint256,address,address[],uint256[],string[],bytes[],uint256,uint256,string)
          handler: handleProposalCreated
        - event: VoteCast(indexed address,uint256,uint8,uint256,string)
          handler: handleVoteCast
        - event: ProposalQueued(uint256,uint256)
          handler: handleProposalQueued
        - event: ProposalExecuted(uint256)
          handler: handleProposalExecuted
        - event: ProposalCanceled(uint256)
          handler: handleProposalCanceled
      file: ./src/governor.ts

  - kind: ethereum/contract
    name: AMMPool
    network: arbitrum-sepolia
    source:
      address: "0x699653684Ba8a4463C8784324b0E89C6E05D7F14"
      abi: AMMPool
      startBlock: 269170271
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Swap
      abis:
        - name: AMMPool
          file: ./abis/AMMPool.json
      eventHandlers:
        - event: Swap(indexed address,indexed address,indexed address,uint256,uint256,address)
          handler: handleSwap
      file: ./src/amm-pool.ts
