specVersion: 1.3.0
schema:
  file: ./schema.graphql

dataSources:
  - kind: ethereum/contract
    name: AMMPool
    network: placeholder-l2-testnet
    source:
      address: "0x0000000000000000000000000000000000000000"
      abi: AMMPool
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      file: ./src/mappings.ts
      entities:
        - User
        - Swap
        - VaultDeposit
        - Proposal
        - Vote
      abis:
        - name: AMMPool
          file: ./abis/AMMPool.json
      eventHandlers:
        - event: Swap(indexed address,indexed address,uint256,uint256)
          handler: handleSwap
        - event: LiquidityAdded(indexed address,uint256,uint256,uint256)
          handler: handleLiquidityAdded
        - event: LiquidityRemoved(indexed address,uint256,uint256,uint256)
          handler: handleLiquidityRemoved
        - event: Deposit(indexed address,uint256,uint256)
          handler: handleVaultDeposit
        - event: ProposalCreated(uint256,address,string)
          handler: handleProposalCreated
        - event: VoteCast(address,uint256,uint8,uint256,string)
          handler: handleVoteCast
