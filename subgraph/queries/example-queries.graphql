query RecentSwaps {
  swaps(first: 10, orderBy: timestamp, orderDirection: desc) {
    id
    trader
    tokenIn
    tokenOut
    amountIn
    amountOut
    timestamp
    blockNumber
    transactionHash
  }
}

query RecentProposals {
  proposals(first: 10, orderBy: createdAt, orderDirection: desc) {
    id
    proposalId
    proposer
    description
    voteStart
    voteEnd
    state
    createdAt
    blockNumber
    transactionHash
  }
}

query RecentVotes {
  votes(first: 10, orderBy: timestamp, orderDirection: desc) {
    id
    proposal {
      id
      description
      state
    }
    proposalId
    voter
    support
    weight
    reason
    timestamp
    blockNumber
    transactionHash
  }
}
